let cart = JSON.parse(localStorage.getItem("heardCart")) || [];

function saveCart(){
  localStorage.setItem("heardCart", JSON.stringify(cart));
  renderCart();
}

function addToCart(name, price, license, downloadUrl){
  cart.push({
    name,
    price,
    license,
    downloadUrl
  });

  saveCart();
  alert(name + " added to basket");
}

function removeFromCart(index){
  cart.splice(index, 1);
  saveCart();
}
function renderBeats() {
  const container = document.getElementById("beatsContainer");

  container.innerHTML = beats.map((beat, index) => `
    <div class="beat-card">
      <img src="${beat.image}" alt="${beat.title}" style="width:100%;border-radius:10px;margin-bottom:10px;">
      <h3>${beat.title}</h3>
      <p>${beat.description}</p>

      <button onclick="addToCart(beats[${index}].title,45,'MP3 Lease',beats[${index}].mp3)">
        MP3 - £45
      </button>

      <button onclick="addToCart(beats[${index}].title,65,'WAV Lease',beats[${index}].wav)">
        WAV - £65
      </button>

      <button onclick="addToCart(beats[${index}].title,300,'Trackout Lease',beats[${index}].zip)">
        Trackout - £300
      </button>
    </div>
  `).join("");
}
function renderCart(){
  document.getElementById("cartCount").innerText = cart.length;

  const cartItems = document.getElementById("cartItems");
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("cartTotal").innerText = total;

  cartItems.innerHTML = cart.length ? cart.map((item, index) => `
    <div class="cart-item">
      <div>
        <strong>${item.name}</strong><br>
        ${item.license}<br>
        £${item.price}
      </div>
      <div class="remove" onclick="removeFromCart(${index})">Remove</div>
    </div>
  `).join("") : "<p>Your basket is empty.</p>";
}

function toggleCart(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

async function checkout(){
  const items = cart.map(item => ({
    name: item.name,
    price: item.price,
    license: item.license,
    downloadUrl: item.downloadUrl
  }));

  try {
    const response = await fetch("/api/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ items })
    });

    const data = await response.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Stripe checkout failed.");
    }

  } catch (error) {
    console.error(error);
    alert("Error connecting to Stripe.");
  }
}
