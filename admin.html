<!DOCTYPE html>
<html>
<head>
  <title>Heard Music Admin</title>
</head>
<body>
  <script>
  const password = prompt("Enter admin password:");

  if (password !== Youcansayyouheard6!) {
    alert("Access denied");
    window.location.href = "/";
  }
</script>
  <h1>Heard Music Admin</h1>

  <form id="beatForm">
    <input name="title" placeholder="Beat Title" required><br><br>
    <input name="category" placeholder="Genre / Category" required><br><br>
    <input name="mood" placeholder="Mood"><br><br>
    <input name="bpm" placeholder="BPM"><br><br>
    <input name="key" placeholder="Key"><br><br>

    <input name="mp3Price" placeholder="MP3 Price" value="45"><br><br>
    <input name="wavPrice" placeholder="WAV Price" value="65"><br><br>
    <input name="trackoutPrice" placeholder="Trackout Price" value="300"><br><br>

    <input name="image" placeholder="Cover Image URL"><br><br>
    <input name="previewUrl" placeholder="Preview Audio URL"><br><br>
    <input name="mp3Url" placeholder="MP3 File URL"><br><br>
    <input name="wavUrl" placeholder="WAV File URL"><br><br>
    <input name="trackoutUrl" placeholder="Trackout ZIP URL"><br><br>

    <textarea name="description" placeholder="Description"></textarea><br><br>

    <button type="submit">Create Beat</button>
  </form>
    <hr>

<h2>Manage Beats</h2>
<div id="beatsList">Loading beats...</div>
  <script>
    let editingBeatId = null;
    document.getElementById("beatForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const form = new FormData(e.target);
      const beatData = Object.fromEntries(form.entries());

      beatData.mp3Price = Number(beatData.mp3Price);
      beatData.wavPrice = Number(beatData.wavPrice);
      beatData.trackoutPrice = Number(beatData.trackoutPrice);
      beatData.published = true;
      beatData.sold = false;

     if (editingBeatId) {
  beatData.id = editingBeatId;
}

const res = await fetch("/api/beats", {
  method: editingBeatId ? "PUT" : "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(beatData)
      });

      const data = await res.json();

      if (!res.ok) {
        alert("Error: " + data.error);
        return;
      }

      alert("Beat saved!");
      e.target.reset();
    });
async function loadBeats() {
  const res = await fetch("/api/beats?t=" + Date.now());
  const data = await res.json();

  const beatsList = document.getElementById("beatsList");

  if (!data.beats || data.beats.length === 0) {
    beatsList.innerHTML = "<p>No beats found.</p>";
    return;
  }

  beatsList.innerHTML = data.beats.map(beat => `
    <div style="border:1px solid #ccc; padding:12px; margin:10px 0;">
      <strong>${beat.title || "Untitled Beat"}</strong><br>
      Genre: ${beat.category || "N/A"}<br>
      Mood: ${beat.mood || "N/A"}<br>
      BPM: ${beat.bpm || "N/A"}<br>
      Key: ${beat.key || "N/A"}<br><br>

      <button onclick='editBeat(${JSON.stringify(beat)})'>Edit</button>
<button onclick="deleteBeat('${beat._id}')">Delete</button>
    </div>
  `).join("");
}
function editBeat(beat) {
  editingBeatId = beat._id;

  const form = document.getElementById("beatForm");

  form.title.value = beat.title || "";
  form.category.value = beat.category || "";
  form.mood.value = beat.mood || "";
  form.bpm.value = beat.bpm || "";
  form.key.value = beat.key || "";

  form.mp3Price.value = beat.mp3Price || 45;
  form.wavPrice.value = beat.wavPrice || 65;
  form.trackoutPrice.value = beat.trackoutPrice || 300;

  form.image.value = beat.image || "";
  form.previewUrl.value = beat.previewUrl || "";
  form.mp3Url.value = beat.mp3Url || "";
  form.wavUrl.value = beat.wavUrl || "";
  form.trackoutUrl.value = beat.trackoutUrl || "";
  form.description.value = beat.description || "";

  document.querySelector("button[type='submit']").textContent = "Update Beat";
  window.scrollTo(0, 0);
}
async function deleteBeat(id) {
  if (!confirm("Delete this beat?")) return;

  const res = await fetch("/api/beats", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error deleting beat: " + data.error);
    return;
  }

alert(editingBeatId ? "Beat updated!" : "Beat saved!");
editingBeatId = null;
e.target.reset();
document.querySelector("button[type='submit']").textContent = "Create Beat";
await loadBeats();
}

loadBeats();
  </script>
</body>
</html>
